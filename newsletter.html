<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ニュースレター登録</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #222;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .page {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.4;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0 auto 24px;
      font-size: 16px;
      line-height: 1.7;
      color: #555;
    }

    .embed-viewport {
      width: 480px;
      height: 360px;
      max-width: 100%;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid #eeeeee;
      background: #ffffff;
    }

    .embed-viewport iframe {
      display: block;
      width: 480px;
      height: 360px;
      border: none;
      background: #ffffff;
    }

    .back {
      display: inline-block;
      margin-top: 24px;
      font-size: 16px;
      color: #1686bd;
      text-decoration: none;
      font-weight: 600;
    }

    .back:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      body {
        padding: 28px 12px;
      }

      .page {
        max-width: 100%;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 10px;
      }

      .lead {
        font-size: 14px;
        margin-bottom: 20px;
      }

      .embed-viewport {
        width: 336px;
        height: 252px;
      }

      .embed-viewport iframe {
        width: 480px;
        height: 360px;
        transform: scale(0.7);
        transform-origin: top left;
      }

      .back {
        margin-top: 22px;
        font-size: 15px;
      }
    }

    @media (max-width: 380px) {
      body {
        padding-left: 10px;
        padding-right: 10px;
      }

      h1 {
        font-size: 22px;
      }

      .embed-viewport {
        width: 320px;
        height: 240px;
      }

      .embed-viewport iframe {
        transform: scale(0.667);
      }
    }

    @media (max-width: 340px) {
      .embed-viewport {
        width: 300px;
        height: 225px;
      }

      .embed-viewport iframe {
        transform: scale(0.625);
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="corner"></div>

    <h1>ニュースレター登録</h1>
    <p class="lead">Substackで配信中です。</p>

    <div class="embed-area">
      <iframe src="https://takehisamark.substack.com/embed" width="480" height="320" style="border: 1px solid #EEE; background: white" frameborder="0" scrolling="no"></iframe>
    </div>
    <a class="back" href="https://lit.link/media-links">← 戻る</a>
  </main>
</body>
</html>
