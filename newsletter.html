<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ニュースレター登録</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #222;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .page {
      width: 100%;
      max-width: 680px;
    }

    .card {
      width: 100%;
      background: #ffffff;
      text-align: center;
      padding: 24px 0 40px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 30px;
      line-height: 1.4;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0 auto 28px;
      font-size: 17px;
      line-height: 1.8;
      color: #555;
    }

    .embed-wrap {
      width: 480px;
      height: 430px;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid #eeeeee;
      background: #ffffff;
    }

    .embed-wrap iframe {
      display: block;
      width: 480px;
      height: 430px;
      border: none;
      background: #ffffff;
    }

    .back {
      display: inline-block;
      margin-top: 28px;
      font-size: 16px;
      color: #1686bd;
      text-decoration: none;
      font-weight: 600;
    }

    .back:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      body {
        padding: 28px 10px;
      }

      .card {
        padding-top: 12px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 10px;
      }

      .lead {
        font-size: 14px;
        line-height: 1.7;
        margin-bottom: 22px;
      }

      .embed-wrap {
        width: 360px;
        height: 323px;
      }

      .embed-wrap iframe {
        width: 480px;
        height: 430px;
        transform: scale(0.75);
        transform-origin: top left;
      }

      .back {
        margin-top: 24px;
        font-size: 15px;
      }
    }

    @media (max-width: 430px) {
      .embed-wrap {
        width: 340px;
        height: 305px;
      }

      .embed-wrap iframe {
        transform: scale(0.708);
      }
    }

    @media (max-width: 390px) {
      .embed-wrap {
        width: 320px;
        height: 287px;
      }

      .embed-wrap iframe {
        transform: scale(0.667);
      }
    }

    @media (max-width: 360px) {
      .embed-wrap {
        width: 300px;
        height: 269px;
      }

      .embed-wrap iframe {
        transform: scale(0.625);
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="corner"></div>

    <h1>ニュースレター登録</h1>
    <p class="lead">Substackで配信中です。</p>

    <div class="embed-area">
      <iframe src="https://takehisamark.substack.com/embed" width="480" height="320" style="border: 1px solid #EEE; background: white" frameborder="0" scrolling="no"></iframe>
    </div>
    <a class="back" href="https://lit.link/media-links">← 戻る</a>
  </main>
</body>
</html>
