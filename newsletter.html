<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>無料メルマガ登録</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 22px;
      padding: 56px 36px 42px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.08);
      text-align: center;
      box-sizing: border-box;
      overflow: hidden;
    }

    .corner {
      position: absolute;
      top: 0;
      left: 0;
      width: 150px;
      height: 150px;
      background: #3b92bd;
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }

    h1 {
      margin: 0 0 18px;
      font-size: 24px;
      font-weight: 700;
      color: #222;
      line-height: 1.5;
    }

    .lead {
      margin: 0 0 28px;
      font-size: 16px;
      color: #444;
      line-height: 1.7;
    }

    .embed-area {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .embed-area iframe {
      width: 100%;
      max-width: 460px;
      min-height: 320px;
      border: 1px solid #eeeeee;
      background: #fff;
    }

    .back {
      display: inline-block;
      margin-top: 28px;
      font-size: 15px;
      color: #1686bd;
      text-decoration: none;
    }

    .back:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .card {
        padding: 48px 20px 34px;
        border-radius: 18px;
      }

      .corner {
        width: 120px;
        height: 120px;
      }

      h1 {
        font-size: 22px;
      }

      .lead {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="corner"></div>

    <h1>無料メルマガ登録</h1>
    <p class="lead">Substackで配信中です。</p>

    <div class="embed-area">
      <iframe src="https://takehisamark.substack.com/embed" width="480" height="320" style="border: 1px solid #EEE; background: white" frameborder="0" scrolling="no"></iframe>
    </div>

    <a class="back" href="https://lit.link/takehisa-mark">← 戻る</a>
  </main>
</body>
</html>
