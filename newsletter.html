<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ニュースレター登録</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f3f3f1;
      color: #222;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: #ffffff;
      border-radius: 22px;
      padding: 48px 28px 40px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0 auto 28px;
      font-size: 17px;
      line-height: 1.7;
      color: #444;
    }

    .embed-shell {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 18px;
      background: #f2f2f2;
      border-radius: 14px;
    }

    .embed-area {
      width: 100%;
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
    }

    .embed-area iframe {
      display: block;
      width: 100%;
      height: 520px;
      border: 1px solid #eeeeee;
      background: #ffffff;
    }

    .back {
      display: inline-block;
      margin-top: 26px;
      font-size: 16px;
      color: #1686bd;
      text-decoration: none;
      font-weight: 600;
    }

    .back:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      body {
        align-items: flex-start;
        padding: 18px 12px;
      }

      .card {
        border-radius: 18px;
        padding: 34px 14px 32px;
      }

      h1 {
        font-size: 25px;
        margin-bottom: 12px;
      }

      .lead {
        font-size: 16px;
        margin-bottom: 22px;
      }

      .embed-shell {
        padding: 10px;
        border-radius: 12px;
      }

      .embed-area iframe {
        height: 610px;
      }

      .back {
        margin-top: 24px;
        font-size: 16px;
      }
    }

    @media (max-width: 390px) {
      .card {
        padding: 32px 10px 30px;
      }

      h1 {
        font-size: 23px;
      }

      .lead {
        font-size: 15px;
      }

      .embed-shell {
        padding: 8px;
      }

      .embed-area iframe {
        height: 620px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="corner"></div>

    <h1>ニュースレター登録</h1>
    <p class="lead">Substackで配信中です。</p>

    <div class="embed-area">
      <iframe src="https://takehisamark.substack.com/embed" width="480" height="320" style="border: 1px solid #EEE; background: white" frameborder="0" scrolling="no"></iframe>
    </div>
    <a class="back" href="https://lit.link/media-links">← 戻る</a>
  </main>
</body>
</html>
