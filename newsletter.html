<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ニュースレター登録</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f7f7f5;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
    }

    .page {
      width: 100%;
      max-width: 760px;
    }

    .card {
      width: 100%;
      background: #ffffff;
      border-radius: 24px;
      padding: 44px 40px 36px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #777;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.45;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 18px auto 30px;
      max-width: 560px;
      font-size: 16px;
      line-height: 1.9;
      color: #555;
    }

    .embed-card {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 0;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
    }

    .embed-card iframe {
      display: block;
      width: 100%;
      height: 430px;
      border: 1px solid #eeeeee;
      background: #ffffff;
    }

    .note {
      margin: 18px auto 0;
      max-width: 520px;
      font-size: 13px;
      line-height: 1.8;
      color: #777;
    }

    .back {
      display: inline-block;
      margin-top: 28px;
      font-size: 15px;
      color: #1686bd;
      text-decoration: none;
      font-weight: 600;
    }

    .back:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      body {
        align-items: flex-start;
        padding: 16px 10px;
        background: #ffffff;
      }

      .card {
        border-radius: 0;
        box-shadow: none;
        padding: 28px 10px 30px;
      }

      .eyebrow {
        font-size: 12px;
        margin-bottom: 10px;
      }

      h1 {
        font-size: 24px;
      }

      .lead {
        margin: 14px auto 22px;
        font-size: 14px;
        line-height: 1.8;
      }

      .embed-card {
        max-width: 100%;
        border-radius: 10px;
      }

      .embed-card iframe {
        height: 460px;
      }

      .note {
        font-size: 12px;
        line-height: 1.7;
        padding: 0 6px;
      }

      .back {
        margin-top: 24px;
        font-size: 14px;
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 22px;
      }

      .lead {
        font-size: 13px;
      }

      .embed-card iframe {
        height: 480px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="corner"></div>

    <h1>ニュースレター登録</h1>
    <p class="lead">Substackで配信中です。</p>

    <div class="embed-area">
      <iframe src="https://takehisamark.substack.com/embed" width="480" height="320" style="border: 1px solid #EEE; background: white" frameborder="0" scrolling="no"></iframe>
    </div>
    <a class="back" href="https://lit.link/media-links">← 戻る</a>
  </main>
</body>
</html>
